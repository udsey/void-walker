services:
  db:
    container_name: void-walker-db
    build:
      context: .
      dockerfile: Dockerfile.db
      args:
        ACTIONS_LIMIT: ${ACTIONS_LIMIT}
        DB_NAME: ${DB_NAME}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5453:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  walker:
    container_name: void-walker-walker
    profiles: ["manual"]
    build:
      context: .
      dockerfile: Dockerfile.walker
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy


  libretranslate:
    container_name: void-walker-translate
    image: libretranslate/libretranslate:latest
    command: --load-only en,es,fr,de,pt,ru,zh,ar,ja,hi
    environment:
      LT_API_KEYS: "false"
    ports:
      - '5000:5000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 600s
    volumes:
      - lt_models:/home/libretranslate/.local

  dashboard:
    container_name: void-walker-dashboard
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8050:8050"
    depends_on:
      db:
        condition: service_healthy
      libretranslate:
        condition: service_started

volumes:
  pgdata:
  lt_models: